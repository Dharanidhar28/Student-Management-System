<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Student Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>

<body class="login-body">
<main class="login-shell">
<section class="login-panel">
<div class="login-brand">
<span class="brand-mark">SM</span>
<div>
<p class="eyebrow">Student Management</p>
<h1>Welcome back</h1>
</div>
</div>

<form class="login-card" onsubmit="login(event)">
<label class="form-label" for="username">Email</label>
<input id="username" class="form-control" placeholder="admin@example.com" autocomplete="username">

<label class="form-label mt-3" for="password">Password</label>
<input id="password" type="password" class="form-control" placeholder="Enter password" autocomplete="current-password">

<button type="submit" class="btn btn-primary w-100 mt-4">Login</button>
<p id="loginError" class="login-error" role="alert"></p>
</form>
</section>
</main>

<script>
async function login(event) {
event.preventDefault();

const errorElement = document.getElementById("loginError");
errorElement.innerText = "";

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;
const formData = new URLSearchParams();

formData.append("username", username);
formData.append("password", password);

try {
const res = await fetch("/login", {
method: "POST",
headers: {
"Content-Type": "application/x-www-form-urlencoded"
},
body: formData
});

const data = await res.json();

if (data.access_token) {
localStorage.setItem("token", data.access_token);
window.location.href = "/static/index.html";
return;
}

errorElement.innerText = "Login failed. Check your email and password.";
} catch (error) {
errorElement.innerText = "Unable to reach the server. Please try again.";
}
}
</script>
</body>

</html>
