services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: student-management-backend:latest
    restart: always
    environment:
      SECRET_KEY: mysupersecretkey123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DATABASE_URL: sqlite:////app/data/students.db
      PORT: 8000
    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: student-management-frontend:latest
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: always
  
volumes:
  backend-data:
