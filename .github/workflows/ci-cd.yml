name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Check Python dependencies
        run: pip check

      - name: Compile backend code
        run: python -m compileall backend

      - name: Import FastAPI app
        env:
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          DATABASE_URL: sqlite:///./test_students.db
        run: python -c "from backend.app.main import app; print(app.title)"

      - name: Build Docker images
        run: docker compose build

      - name: Start application
        run: docker compose up -d

      - name: Smoke test backend and frontend
        run: |
          sleep 10
          curl --fail http://localhost:8000/docs
          curl --fail http://localhost:3000/

      - name: Stop application
        if: always()
        run: docker compose down -v

  cd:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip deploy when secret is missing
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured, so deployment was skipped."
